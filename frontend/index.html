<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucy Finance App - Plaid Integration</title>
    <script src="https://cdn.plaid.com/link/v3/stable/link-initialize.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            color: #667eea;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        .status.info {
            background: #e3f2fd;
            color: #1976d2;
            display: block;
        }

        .status.success {
            background: #e8f5e9;
            color: #388e3c;
            display: block;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }

        .transactions-container {
            display: none;
        }

        .transaction-item {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 4px;
        }

        .transaction-item.expense {
            border-left-color: #ef5350;
        }

        .transaction-item.income {
            border-left-color: #66bb6a;
        }

        .transaction-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            font-size: 15px;
        }

        .transaction-meta {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #666;
        }

        .transaction-amount {
            font-weight: 600;
            font-size: 14px;
        }

        .transaction-date {
            color: #999;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .button-group button {
            flex: 1;
            margin-bottom: 0;
        }

        .info-box {
            background: #f0f4ff;
            border: 1px solid #dadfe8;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #555;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Lucy Finance App</h1>
        <p class="subtitle">Connect your bank account and view transactions</p>

        <div class="info-box">
            <strong>Sandbox Mode:</strong> Use the Plaid sandbox credentials to test the integration without connecting a real bank account.
        </div>

        <div class="section">
            <div class="section-title">Step 1: Connect Bank Account</div>
            <div id="linkStatus" class="status"></div>
            <button id="connectBtn" onclick="initiatePlaidLink()">
                Connect Bank Account
            </button>
        </div>

        <div class="section">
            <div class="section-title">Step 2: View Transactions</div>
            <button id="transactionsBtn" onclick="fetchTransactions()" disabled>
                Fetch Transactions
            </button>
        </div>

        <div id="transactionsContainer" class="transactions-container">
            <div class="section-title">Recent Transactions</div>
            <div id="transactionsList"></div>
        </div>

        <div class="section">
            <div class="section-title">Debug Info</div>
            <button class="button-group">
                <button onclick="resetConnection()" style="flex: 1; margin-bottom: 0; background: #999;">Reset</button>
            </button>
            <div id="debugInfo" style="font-size: 12px; color: #666; margin-top: 10px; word-break: break-all;"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
